
services:
  # Next.js Frontend
  frontend:
    container_name: newscards-prod-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile # Use your multi-stage prod Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-${SUPABASE_URL}}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-${SUPABASE_ANON_KEY}}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      # Keep exports persistent on your storage path
      - ${DOCKER_VOLUME_BASE}/exports:/app/public/exports
    environment:
      - ENVIRONMENT=production
      - NODE_ENV=production
      - PORT=${FRONTEND_PORT}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-${SUPABASE_URL}}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-${SUPABASE_ANON_KEY}}
    restart: unless-stopped

  # FastAPI Backend
  backend:
    container_name: newscards-prod-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      - ENVIRONMENT=production
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - CHROME_WS_URL=http://chrome:9222
    depends_on:
      - redis
    restart: unless-stopped

  # Redis for Queue
  redis:
    image: redis:alpine
    container_name: newscards-prod-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Alpine Chrome Renderer
  chrome:
    container_name: newscards-prod-chrome
    build:
      context: ./backend
      dockerfile: Dockerfile.chrome
    ports:
      - "9222:9222"
    restart: unless-stopped
    shm_size: "1gb"

  # Background Queue Worker
  worker:
    container_name: newscards-prod-worker
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ENVIRONMENT=production
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - CHROME_WS_URL=ws://chrome:9222
      - FRONTEND_INTERNAL_URL=http://frontend:${FRONTEND_PORT}
    command: ["arq", "worker.WorkerSettings"]
    depends_on:
      - redis
      - chrome
      - frontend
    restart: unless-stopped

networks:
  default:
    name: newscards-prod-net