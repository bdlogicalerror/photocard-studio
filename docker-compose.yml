services:
  photocard-studio:
    container_name: photocard
    build: .
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    volumes:
      - ./exports:/app/public/exports
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3001}
      - HOSTNAME=0.0.0.0
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:${PORT:-3001}}
      - PHOTOCARD_API_URL=http://photocard:${PORT:-3001}/api/generate
    restart: unless-stopped
