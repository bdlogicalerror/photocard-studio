services:
  photocard-studio:
    container_name: photocard
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./exports:/app/public/exports
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:3000}
      - PHOTOCARD_API_URL=http://photocard:3000/api/generate
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: photocard-tunnel
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    network_mode: service:photocard-studio
    restart: unless-stopped
