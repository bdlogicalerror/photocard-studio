# docker-compose.dev.yml

services:
  # Next.js Frontend
  frontend:
    container_name: newscards-studio
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./frontend:/app
      - ${DOCKER_VOLUME_BASE}/frontend/node_modules:/app/node_modules
      - newscards_next_cache:/app/.next
      - ${DOCKER_VOLUME_BASE}/exports:/app/public/exports
    environment:
      - ENVIRONMENT=development
      - PORT=${FRONTEND_PORT}
      - WATCHPACK_POLLING=true # Critical for hot-reload on M1 Docker
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    command: sh -c "npm install && npm run dev"
    restart: always

  # FastAPI Renderer (Backend)
  backend:
    container_name: newscards-renderer
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./backend:/code
      - ${DOCKER_VOLUME_BASE}/backend/venv:/venv
      - ${DOCKER_VOLUME_BASE}/backend/pip-cache:/root/.cache/pip
      - ${DOCKER_VOLUME_BASE}/backend/tmp:/tmp/photocards
    environment:
      - ENVIRONMENT=development
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - TZ=Asia/Dhaka
      - PATH=/venv/bin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - VIRTUAL_ENV=/venv
      - REDIS_URL=redis://redis:6379
    command: sh -c "[ ! -d /venv/bin ] && python3 -m venv /venv; /venv/bin/pip install -r requirements.txt && /venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port ${BACKEND_PORT} --reload"
    depends_on:
      - redis
    restart: always

  # Redis for Queue
  redis:
    image: redis:alpine
    container_name: newscards-redis
    ports:
      - "6379:6379"
    restart: always

  # Alpine Chrome Renderer
  chrome:
    container_name: newscards-chrome
    build:
      context: ./backend
      dockerfile: Dockerfile.chrome
    ports:
      - "9222:9222"
    restart: always
    shm_size: "1gb"
    cap_add:
      - SYS_ADMIN

  # Background Queue Worker
  worker:
    container_name: newscards-worker
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/code
      - ${DOCKER_VOLUME_BASE}/backend/venv:/venv
      - ${DOCKER_VOLUME_BASE}/backend/pip-cache:/root/.cache/pip
      - ${DOCKER_VOLUME_BASE}/backend/tmp:/tmp/photocards
    environment:
      - ENVIRONMENT=development
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - TZ=Asia/Dhaka
      - PATH=/venv/bin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - VIRTUAL_ENV=/venv
      - REDIS_URL=redis://redis:6379
      - CHROME_WS_URL=http://chrome:9222
      - FRONTEND_INTERNAL_URL=http://frontend:3003
    command: sh -c "[ ! -d /venv/bin ] && python3 -m venv /venv; /venv/bin/pip install -r requirements.txt && /venv/bin/arq worker.WorkerSettings"
    depends_on:
      - redis
      - chrome
    restart: always

networks:
  default:
    name: newscards-dev-net
    driver: bridge

volumes:
  newscards_next_cache: